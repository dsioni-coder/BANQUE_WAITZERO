version: '3.8'

services:
  db_auth:
    image: postgres:15-alpine
    container_name: agency_db_auth
    environment:
      POSTGRES_USER: auth_admin
      POSTGRES_PASSWORD: secure_auth_pass
      POSTGRES_DB: auth_db
    volumes:
      - auth_data:/var/lib/postgresql/data
    networks:
      - agency_network

  db_queue:
    image: postgres:15-alpine
    container_name: agency_db_queue
    environment:
      POSTGRES_USER: queue_admin
      POSTGRES_PASSWORD: secure_queue_pass
      POSTGRES_DB: queue_db
    volumes:
      - queue_data:/var/lib/postgresql/data
    networks:
      - agency_network

  auth_service:
    build: ./auth_service
    container_name: agency_auth_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./auth_service:/app
    ports:
      - "8001:8000" # ACCESSIBLE EN LOCAL SUR LE PORT 8001
    environment:
      - DB_HOST=db_auth
      - DB_USER=auth_admin
      - DB_PASS=secure_auth_pass
      - DB_NAME=auth_db
    depends_on:
      - db_auth
    networks:
      - agency_network

  queue_service:
    build: ./queue_service
    container_name: agency_queue_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./queue_service:/app
    ports:
      - "8002:8000" # ACCESSIBLE EN LOCAL SUR LE PORT 8002
    environment:
      - DB_HOST=db_queue
      - DB_USER=queue_admin
      - DB_PASS=secure_queue_pass
      - DB_NAME=queue_db
    depends_on:
      - db_queue
    networks:
      - agency_network

  sync_service:
    build: ./sync_service
    container_name: agency_sync_service
    restart: always # Résilience maximale : si le conteneur plante, Docker le redémarre
    environment:
      - POSTGRES_DB=queue_db
      - POSTGRES_USER=queue_admin
      - POSTGRES_PASSWORD=secure_queue_pass
      - DB_HOST=db_queue # Pointe vers le conteneur de la base de données de l'agence
      - DB_PORT=5432
    depends_on:
      - db_queue # Empêche le démarrage si la base de données n'est pas prête
    networks:
      - agency_network

  gateway:
    image: nginx:alpine
    container_name: agency_gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth_service
      - queue_service
      # - frontend  <-- Commenté temporairement
    networks:
      - agency_network

networks:
  agency_network:
    driver: bridge

volumes:
  auth_data:
  queue_data: